id = "dotfiles.usage-limits"
name = "Usage Limits"
version = "0.2.0"
min_herdr_version = "0.7.0"
description = "CC/Codex rate-limit overlay (tmux status-right parity)"
platforms = ["macos"]

[[panes]]
id = "limits"
title = "CC / Codex Usage Limits"
placement = "overlay"
command = ["./run.sh"]

# サイドバー常時表示の自動起動: workspace 作成のたびに limits pane の存在を保証
[[events]]
on = "workspace.created"
command = ["./ensure-open.sh"]

# ウィンドウタイトル書き込み用 paneless デーモンの自動起動
# 既存セッションには workspace.created が飛ばないため、初回は
# `herdr plugin action invoke start-title-daemon --plugin dotfiles.usage-limits` で手動起動する
[[events]]
on = "workspace.created"
command = ["./ensure-title-daemon.sh"]

[[actions]]
id = "open-or-focus"
title = "Open or focus usage limits"
command = ["./open-or-focus.sh"]

[[actions]]
id = "start-title-daemon"
title = "Start usage-limits title daemon"
command = ["./ensure-title-daemon.sh"]

[[actions]]
id = "stop-title-daemon"
title = "Stop usage-limits title daemon"
command = ["./ensure-title-daemon.sh", "stop"]
